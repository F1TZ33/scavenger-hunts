<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Simple Order Form</title>
<style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d7dce5;
      --text: #1d2430;
      --muted: #677286;
      --accent: #124ea2;
      --accent-2: #0b3a79;
      --bad: #b42318;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 980px; margin: 0 auto; padding: 18px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 6px 20px rgba(16, 24, 40, 0.06); padding: 18px; }
    h1 { margin: 0 0 16px; font-size: 1.5rem; }
    .top-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 18px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.88rem; color: var(--muted); font-weight: 700; }
    .field input { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 12px; font-size: 1rem; background: #fff; color: var(--text); }
    .company { grid-column: span 2; }
    .customer, .email, .date, .reference { grid-column: span 1; }
    .section-title { margin: 0 0 10px; font-size: 1rem; }
    .items-head, .item-row { display: grid; grid-template-columns: minmax(0, 1fr) 120px 108px; gap: 10px; align-items: end; }
    .items-head { padding: 0 0 8px; color: var(--muted); font-size: 0.85rem; font-weight: 700; }
    .rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .item-row { padding: 10px; border: 1px solid var(--line); border-radius: 12px; background: #fbfcfe; }
    .row-actions { display: flex; justify-content: flex-end; margin-top: 6px; }
    .btn { border: 0; border-radius: 10px; padding: 12px 14px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-2); }
    .btn-secondary { background: #eef2f8; color: var(--text); border: 1px solid var(--line); }
    .btn-danger { background: #fff2f0; color: var(--bad); border: 1px solid #f3c8c2; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin: 14px 0 0; align-items: center; }
    .camera-panel { margin-top: 16px; padding: 14px; border: 1px solid var(--line); border-radius: 12px; background: #f9fbff; display: none; }
    .camera-panel.active { display: block; }
    .video-wrap { position: relative; width: 100%; max-width: 420px; border-radius: 12px; overflow: hidden; background: #111; }
    #video { display: block; width: 100%; height: auto; background: #111; }
    #captureCanvas { display: none; }
    .status { margin-top: 10px; font-size: 0.92rem; color: var(--muted); min-height: 1.2em; }
    .final-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line); flex-wrap: wrap; }
    .hint { font-size: 0.9rem; color: var(--muted); line-height: 1.4; }
    @media (max-width: 760px) {
      .top-grid { grid-template-columns: 1fr 1fr; }
      .company, .customer, .email, .date, .reference { grid-column: span 1; }
      .items-head { display: none; }
      .item-row { grid-template-columns: 1fr 1fr; }
      .item-row .field:first-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body><div id="bw-global-header"></div>
<div class="wrap">
<div class="card">
<h1>Order Form</h1>
<div class="top-grid">
<div class="field company">
<label for="companyName">Company Name</label>
<input id="companyName" placeholder="Company name" type="text"/>
</div>
<div class="field customer">
<label for="customerName">Customer Name</label>
<input id="customerName" placeholder="Customer name" type="text"/>
</div>
<div class="field email">
<label for="customerEmail">Email</label>
<input id="customerEmail" placeholder="customer@example.com" type="email"/>
</div>
<div class="field date">
<label for="orderDate">Date</label>
<input id="orderDate" type="date"/>
</div>
<div class="field reference">
<label for="reference">Reference</label>
<input id="reference" placeholder="PO / job / ref" type="text"/>
</div>
</div>
<h2 class="section-title">Items</h2>
<div class="items-head">
<div>Part Number</div>
<div>Quantity</div>
<div>Remove</div>
</div>
<div class="rows" id="rows"></div>
<div class="toolbar">
<button class="btn btn-secondary" id="addRowBtn" type="button">Add Another Line</button>
<button class="btn btn-secondary" id="scanBtn" type="button">Scan QR Code</button>
</div>
<div class="camera-panel" id="cameraPanel">
<div class="video-wrap">
<video id="video" muted="" playsinline=""></video>
<canvas id="captureCanvas"></canvas>
</div>
<div class="status" id="scanStatus">Point the camera at a QR code.</div>
<div class="toolbar">
<button class="btn btn-secondary" id="stopScanBtn" type="button">Stop Scanning</button>
</div>
</div>
<div class="final-bar">
<div class="hint">
          Complete will open the phone or computer email app with the order already formatted in a simple table. The email address entered above is the address it will send to.
        </div>
<button class="btn btn-primary" id="completeBtn" type="button">Complete</button>
</div>
</div>
</div>
<script>
    (function () {
      'use strict';

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      document.addEventListener('DOMContentLoaded', function () {
        const rowsEl = document.getElementById('rows');
        const addRowBtn = document.getElementById('addRowBtn');
        const completeBtn = document.getElementById('completeBtn');
        const scanBtn = document.getElementById('scanBtn');
        const stopScanBtn = document.getElementById('stopScanBtn');
        const cameraPanel = document.getElementById('cameraPanel');
        const scanStatus = document.getElementById('scanStatus');
        const orderDate = document.getElementById('orderDate');
        const customerEmail = document.getElementById('customerEmail');
        const video = document.getElementById('video');
        const canvas = document.getElementById('captureCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let stream = null;
        let scanning = false;
        let scanTimer = null;
        let barcodeDetector = null;

        try {
          if ('BarcodeDetector' in window) {
            barcodeDetector = new window.BarcodeDetector({ formats: ['qr_code'] });
          }
        } catch (e) {
          barcodeDetector = null;
        }

        orderDate.value = new Date().toISOString().slice(0, 10);

        function createRow(part, qty) {
          const row = document.createElement('div');
          row.className = 'item-row';
          row.innerHTML = '\n            <div class="field">\n              <label>Part Number</label>\n              <input type="text" class="part-input" placeholder="Enter or scan part number" value="' + escapeHtml(part) + '" />\n            </div>\n            <div class="field">\n              <label>Quantity</label>\n              <input type="number" class="qty-input" min="1" step="1" inputmode="numeric" placeholder="Qty" value="' + escapeHtml(qty) + '" />\n            </div>\n            <div class="row-actions">\n              <button type="button" class="btn btn-danger remove-btn">Remove</button>\n            </div>\n          ';

          const partInput = row.querySelector('.part-input');
          const qtyInput = row.querySelector('.qty-input');
          const removeBtn = row.querySelector('.remove-btn');

          partInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              qtyInput.focus();
            }
          });

          qtyInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              autoAdvanceRow(row);
            }
          });

          qtyInput.addEventListener('change', function () {
            maybeAddRow(row);
          });

          qtyInput.addEventListener('blur', function () {
            maybeAddRow(row);
          });

          removeBtn.addEventListener('click', function () {
            if (rowsEl.children.length > 1) {
              row.remove();
            } else {
              partInput.value = '';
              qtyInput.value = '';
              partInput.focus();
            }
          });

          rowsEl.appendChild(row);
          return row;
        }

        function isLastRow(row) {
          return row === rowsEl.lastElementChild;
        }

        function addRow(part, qty) {
          const row = createRow(part || '', qty || '');
          const input = row.querySelector('.part-input');
          setTimeout(function () { input.focus(); }, 0);
          return row;
        }

        function maybeAddRow(row) {
          const partInput = row.querySelector('.part-input');
          const qtyInput = row.querySelector('.qty-input');
          if (isLastRow(row) && partInput.value.trim() && qtyInput.value.trim()) {
            addRow();
          }
        }

        function autoAdvanceRow(currentRow) {
          const partInput = currentRow.querySelector('.part-input');
          const qtyInput = currentRow.querySelector('.qty-input');
          if (!partInput.value.trim() || !qtyInput.value.trim()) return;

          if (isLastRow(currentRow)) {
            addRow();
          } else {
            const nextRow = currentRow.nextElementSibling;
            if (nextRow) nextRow.querySelector('.part-input').focus();
          }
        }

        function getRows() {
          return Array.from(document.querySelectorAll('.item-row'))
            .map(function (row) {
              return {
                part: row.querySelector('.part-input').value.trim(),
                qty: row.querySelector('.qty-input').value.trim()
              };
            })
            .filter(function (item) {
              return item.part && item.qty;
            });
        }

        function padRight(text, width) {
          const value = String(text || '');
          return value.length >= width ? value.slice(0, width) : value + ' '.repeat(width - value.length);
        }

        function buildOrderBody() {
          const companyName = document.getElementById('companyName').value.trim();
          const customerName = document.getElementById('customerName').value.trim();
          const email = customerEmail.value.trim();
          const date = orderDate.value;
          const reference = document.getElementById('reference').value.trim();
          const items = getRows();

          if (!email) {
            alert('Please enter the email address.');
            return null;
          }

          if (!items.length) {
            alert('Please enter at least one complete item with part number and quantity.');
            return null;
          }

          const lines = [];
          lines.push('Order Request');
          lines.push('');
          lines.push('Company Name: ' + companyName);
          lines.push('Customer Name: ' + customerName);
          lines.push('Email: ' + email);
          lines.push('Date: ' + date);
          lines.push('Reference: ' + reference);
          lines.push('');
          lines.push(padRight('Part Number', 34) + ' | ' + padRight('Qty', 6));
          lines.push('-'.repeat(34) + '-+-' + '-'.repeat(6));
          items.forEach(function (item) {
            lines.push(padRight(item.part, 34) + ' | ' + padRight(item.qty, 6));
          });
          lines.push('');
          lines.push('Sent from mobile order form.');
          return lines.join('\n');
        }

        function completeOrder() {
          const to = customerEmail.value.trim();
          const reference = document.getElementById('reference').value.trim();
          const companyName = document.getElementById('companyName').value.trim();
          const body = buildOrderBody();
          if (!body) return;

          const subjectParts = ['Order Request'];
          if (companyName) subjectParts.push('- ' + companyName);
          if (reference) subjectParts.push('- Ref ' + reference);
          const subject = subjectParts.join(' ');

          window.location.href = 'mailto:' + encodeURIComponent(to) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
        }

        function applyScannedPart(value) {
          const rows = Array.from(document.querySelectorAll('.item-row'));
          let targetRow = rows.find(function (row) {
            return !row.querySelector('.part-input').value.trim();
          });
          if (!targetRow) {
            targetRow = addRow();
          }
          targetRow.querySelector('.part-input').value = value;
          targetRow.querySelector('.qty-input').focus();
        }

        async function scanFrame() {
          if (!scanning || !barcodeDetector || video.readyState < 2) return;
          try {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const barcodes = await barcodeDetector.detect(imageData);
            if (barcodes && barcodes.length) {
              const rawValue = (barcodes[0].rawValue || '').trim();
              if (rawValue) {
                scanStatus.textContent = 'Scanned: ' + rawValue;
                applyScannedPart(rawValue);
                stopScanning();
                return;
              }
            }
          } catch (e) {
          }
          if (scanning) {
            scanTimer = window.setTimeout(scanFrame, 300);
          }
        }

        async function startScanning() {
          if (scanning) return;
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('Camera access is not available on this device/browser. Please enter the part number manually.');
            return;
          }
          if (!barcodeDetector) {
            alert('Built-in QR scanning is not available in this browser. The form still works offline for manual entry.');
            return;
          }

          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: 'environment' } },
              audio: false
            });
            video.srcObject = stream;
            await video.play();
            scanning = true;
            cameraPanel.classList.add('active');
            scanStatus.textContent = 'Point the camera at a QR code.';
            scanFrame();
          } catch (err) {
            alert('Unable to access the camera. Please allow camera access and try again.');
          }
        }

        function stopTracks() {
          if (stream) {
            stream.getTracks().forEach(function (track) { track.stop(); });
            stream = null;
          }
          video.srcObject = null;
        }

        function stopScanning() {
          scanning = false;
          if (scanTimer) {
            window.clearTimeout(scanTimer);
            scanTimer = null;
          }
          stopTracks();
          cameraPanel.classList.remove('active');
        }

        addRowBtn.addEventListener('click', function () { addRow(); });
        completeBtn.addEventListener('click', completeOrder);
        scanBtn.addEventListener('click', startScanning);
        stopScanBtn.addEventListener('click', stopScanning);

        createRow();
      });
    })();
  </script>
<script src="assets/js/bw-header.js"></script></body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rack Builder</title>
<link href="assets/css/style.css" rel="stylesheet"/>

<style>
.rackVisual{display:grid;gap:14px;margin-top:20px;}
.shelf{border:1px solid rgba(255,255,255,.1);padding:10px;border-radius:10px;}
.shelfTitle{font-weight:bold;margin-bottom:8px;}
.binRow{display:flex;gap:6px;overflow-x:auto;}
.binTile{
  min-width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid red;border-radius:6px;font-weight:bold;
}
</style>
</head>

<body>
<div class="container">
<h1>Rack Builder</h1>

<div class="rackGrid">
<input id="site" placeholder="Company"/>
<input id="category" placeholder="Category"/>
<input id="rack" placeholder="Rack Number"/>
<input id="shelves" type="number" placeholder="Shelves"/>
<input id="bins" type="number" placeholder="Bins"/>
<input id="positions" type="number" placeholder="Positions"/>
</div>

<div style="margin-top:10px;">
<button onclick="buildRack()">Build Rack</button>
<button onclick="downloadCsv()">Download CSV + PDF</button>
</div>

<div id="output"></div>

<script>
let binMap=[], rackRows=[];

function val(id){return document.getElementById(id).value;}

function buildRack(){
  const shelves = +val('shelves');
  const bins = +val('bins');
  const positions = +val('positions');

  binMap=[]; rackRows=[];

  for(let s=1;s<=shelves;s++){
    for(let b=1;b<=bins;b++){
      binMap.push({shelf:s,bin:b,positions});
      for(let p=1;p<=positions;p++){
        rackRows.push({
          location:`Shelf ${s}, Bin ${b}, Position ${p}`,
          part:'',
          desc:''
        });
      }
    }
  }

  render();
}

function render(){
  let html='<div class="rackVisual">';
  let shelves={};

  binMap.forEach(bin=>{
    if(!shelves[bin.shelf]) shelves[bin.shelf]=[];
    shelves[bin.shelf].push(bin);
  });

  Object.keys(shelves).forEach(s=>{
    html+=`<div class="shelf"><div class="shelfTitle">Shelf ${s}</div><div class="binRow">`;
    shelves[s].forEach(b=>{
      html+=`<div class="binTile">${b.positions}</div>`;
    });
    html+='</div></div>';
  });

  html+='</div>';

  html+=`<table style="margin-top:20px;width:100%">
  <tr><th>Part Number</th><th>Description</th></tr>`;

  rackRows.forEach((r,i)=>{
    html+=`
    <tr>
      <td><input data-i="${i}" data-k="part" value="${r.part}"></td>
      <td><input data-i="${i}" data-k="desc" value="${r.desc}"></td>
    </tr>`;
  });

  html+='</table>';

  document.getElementById('output').innerHTML=html;

  document.querySelectorAll('input[data-i]').forEach(inp=>{
    inp.oninput=e=>{
      const i=e.target.dataset.i;
      const k=e.target.dataset.k;
      rackRows[i][k]=e.target.value;
    };
  });
}

function downloadCsv(){
  let lines=[['Part Number','Description'].join(',')];

  rackRows.forEach(r=>{
    lines.push([r.part,r.desc].join(','));
  });

  const blob=new Blob([lines.join('\n')]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);

  const name=`${val('site')}_${val('category')}_${val('rack')}_${new Date().toISOString().slice(0,10)}`;
  a.download=name+'.csv';
  a.click();

  setTimeout(printSummary,300);
}

function printSummary(){
  const company=val('site');
  const category=val('category');
  const rack=val('rack');
  const date=new Date().toLocaleDateString();

  let html=`
  <html><head>
  <style>
  body{font-family:Arial;padding:20px;}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;}
  .cell{border:1px solid #000;height:40px;display:flex;align-items:center;justify-content:center;}
  .page-break{page-break-after:always;}
  </style>
  </head><body>

  <h2>${company} | ${category} | Rack ${rack}</h2>
  <div>${date}</div>

  <div class="grid">`;

  binMap.forEach(b=>{
    html+=`<div class="cell">${b.positions}</div>`;
  });

  html+=`</div><div class="page-break"></div>`;

  let currentShelf='';

  rackRows.forEach(r=>{
    const shelf=r.location.match(/Shelf (\d+)/)[1];
    if(shelf!==currentShelf){
      html+=`<h3>Shelf ${shelf}</h3>`;
      currentShelf=shelf;
    }
    html+=`<div>${r.location}</div>`;
  });

  html+=`</body></html>`;

  const win=window.open('');
  win.document.write(html);
  win.document.close();
  win.print();
}
</script>
</body>
</html>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Rack Builder</title>
<link href="assets/css/style.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<style>
  body{
    padding-top:max(0px, env(safe-area-inset-top));
    padding-bottom:max(28px, calc(env(safe-area-inset-bottom) + 18px));
  }

  .rackCard{
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
    border:1px solid rgba(255,255,255,.10);
    border-radius:20px;
    padding:18px;
    box-shadow:0 14px 32px rgba(0,0,0,.16);
  }

  .rackGrid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:14px;
  }

  .placeholderGrid{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:14px;
    margin-top:14px;
  }

  .field input{
    width:100%;
    height:48px;
    padding:0 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04);
    color:var(--text);
    box-sizing:border-box;
  }

  .btnRow{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:16px;
  }

  .rackOutput{
    margin-top:18px;
    display:grid;
    gap:18px;
  }

  .rackVisual{
    display:grid;
    gap:14px;
    padding:16px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.025);
  }

  .shelf{
    border:1px solid rgba(255,255,255,.10);
    border-radius:14px;
    padding:12px;
    background:rgba(0,0,0,.10);
  }

  .shelfTitle{
    font-weight:800;
    margin-bottom:10px;
    color:var(--text);
  }

  .binRow{
    display:grid;
    gap:8px;
  }

  .binTile{
    aspect-ratio:1;
    min-height:48px;
    border:1px solid rgba(198,40,40,.28);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:8px;
    background:linear-gradient(180deg, rgba(198,40,40,.12), rgba(198,40,40,.06));
    color:var(--text);
    font-weight:900;
    font-size:18px;
    cursor:pointer;
    user-select:none;
    transition:transform .12s ease, border-color .12s ease, background .12s ease;
  }

  .binTile:hover{
    transform:translateY(-1px);
    border-color:rgba(198,40,40,.55);
    background:linear-gradient(180deg, rgba(198,40,40,.18), rgba(198,40,40,.08));
  }

  .binTileZero{
    opacity:.45;
    background:rgba(255,255,255,.025);
    border-color:rgba(255,255,255,.10);
  }

  .binTileActive{
    outline:3px solid rgba(255,255,255,.92);
    border-color:rgba(198,40,40,.95);
    box-shadow:0 0 0 4px rgba(198,40,40,.30), 0 12px 26px rgba(0,0,0,.30);
    transform:translateY(-1px) scale(1.03);
  }

  .rackTableWrap{
    overflow:auto;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.08);
  }

  .rackTable{
    width:100%;
    border-collapse:collapse;
    min-width:860px;
    background:rgba(255,255,255,.03);
    color:var(--text);
  }

  .rackTable th,
  .rackTable td{
    padding:8px 10px;
    border:1px solid rgba(255,255,255,.08);
    color:var(--text);
  }

  .rackTable th{
    font-weight:800;
    background:rgba(255,255,255,.06);
    text-align:left;
  }

  .rackTable input{
    width:100%;
    min-width:90px;
    height:34px;
    border-radius:9px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04);
    color:var(--text);
    padding:0 9px;
    box-sizing:border-box;
  }

  .statusNote{
    margin-top:12px;
    color:var(--muted);
    font-size:13px;
  }

  #csvUpload{
    display:none;
  }

  .qrSection{
    margin-top:18px;
    display:none;
  }

  .qrSection.active{
    display:block;
  }

  .qrHeader{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:12px;
  }

  .qrLabels{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
    gap:12px;
  }

  .qrLabel{
    min-height:126px;
    display:grid;
    grid-template-columns:78px minmax(0,1fr);
    gap:10px;
    align-items:center;
    padding:10px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.10);
    background:#fff;
    color:#111827;
    box-shadow:0 10px 22px rgba(0,0,0,.18);
    break-inside:avoid;
    page-break-inside:avoid;
  }

  .qrCanvasWrap{
    width:78px;
    height:78px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
  }

  .qrCanvasWrap canvas{
    width:78px !important;
    height:78px !important;
  }

  .qrLabelText{
    min-width:0;
  }

  .qrPart{
    font-size:14px;
    line-height:1.15;
    font-weight:900;
    word-break:break-word;
  }

  .qrDesc{
    margin-top:5px;
    font-size:12px;
    line-height:1.15;
    font-weight:700;
    color:#374151;
    word-break:break-word;
  }

  .qrLoc{
    margin-top:7px;
    font-size:10px;
    line-height:1.15;
    color:#4b5563;
    word-break:break-word;
  }

  .qrError{
    padding:12px;
    border-radius:12px;
    background:rgba(198,40,40,.12);
    border:1px solid rgba(198,40,40,.35);
    color:var(--text);
  }

  @media print{
    body{
      background:#fff !important;
      padding:0 !important;
    }

    .siteHeader,
    .topbar,
    .heroPanel,
    .rackCard > form,
    .rackVisual,
    .rackTableWrap,
    .statusNote,
    .qrHeader .btn{
      display:none !important;
    }

    .container{
      max-width:none !important;
      width:100% !important;
      padding:0 !important;
      margin:0 !important;
    }

    .rackCard{
      background:#fff !important;
      border:0 !important;
      box-shadow:none !important;
      padding:0 !important;
    }

    .rackOutput{
      display:block !important;
      margin:0 !important;
    }

    .qrSection{
      display:block !important;
      margin:0 !important;
    }

    .qrHeader{
      color:#111 !important;
      padding:0 0 8px 0 !important;
    }

    .qrLabels{
      grid-template-columns:repeat(3, 1fr);
      gap:6px;
    }

    .qrLabel{
      box-shadow:none !important;
      border:1px solid #d1d5db !important;
    }
  }

  @media (max-width:980px){
    .rackGrid,
    .placeholderGrid{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }
  }

  @media (max-width:760px){
    .container{
      width:100%;
      max-width:100%;
      padding-left:14px;
      padding-right:14px;
      box-sizing:border-box;
      overflow-x:hidden;
    }

    .rackCard{
      padding:14px;
    }

    .rackGrid,
    .placeholderGrid{
      grid-template-columns:1fr;
    }

    .binRow{
      grid-template-columns:repeat(2,minmax(0,1fr)) !important;
    }

    .qrLabels{
      grid-template-columns:1fr;
    }
  }
</style>
</head>
<body>
<div class="container"><div id="bw-global-header"></div>
<section class="heroPanel">
<h1>Rack Builder</h1>
</section>
<section class="rackCard">
<form id="rackForm">
<div class="rackGrid">
<div class="field">
<label>Customer / Site</label>
<input autocomplete="off" id="site"/>
</div>
<div class="field">
<label>Rack / Category</label>
<input autocomplete="off" id="category"/>
</div>
<div class="field">
<label>Rack Number</label>
<input autocomplete="off" id="rack"/>
</div>
<div class="field">
<label>Number of Shelves</label>
<input autocomplete="off" id="shelves" min="1" type="number"/>
</div>
<div class="field">
<label>Bins per Shelf</label>
<input autocomplete="off" id="bins" min="1" type="number"/>
</div>
<div class="field">
<label>Default Positions per Bin</label>
<input autocomplete="off" id="positions" min="1" type="number"/>
</div>
</div>
<div class="placeholderGrid">
<div class="field">
<label>Part Placeholder</label>
<input autocomplete="off" id="partPlaceholder" value="Part"/>
</div>
<div class="field">
<label>Description Placeholder</label>
<input autocomplete="off" id="descPlaceholder" value="Desc"/>
</div>
<div class="field">
<label>Min Placeholder</label>
<input autocomplete="off" id="minPlaceholder" value="0"/>
</div>
<div class="field">
<label>Max Placeholder</label>
<input autocomplete="off" id="maxPlaceholder" value="1"/>
</div>
</div>
<div class="btnRow">
<button class="btn" id="generateBtn" type="button">Build Rack</button>
<button class="btn" id="downloadBtn" type="button">Download CSV</button>
<button class="btn" id="uploadBtn" type="button">Upload CSV</button>
<button class="btn" id="qrBtn" type="button">Generate QR Codes</button>
<button class="btn" id="resetBtn" type="button">Reset</button>
<input accept=".csv,text/csv" id="csvUpload" type="file"/>
</div>
<div class="statusNote" id="statusNote"></div>
</form>
<div class="rackOutput" id="output"></div>
<section class="qrSection" id="qrSection">
<div class="qrHeader">
<h3>QR Labels</h3>
<button class="btn" onclick="window.print()" type="button">Print Labels</button>
</div>
<div class="qrLabels" id="qrLabels"></div>
</section>
</section>
</div>
<script>
(() => {
  const output = document.getElementById('output');
  const statusNote = document.getElementById('statusNote');
  const uploadInput = document.getElementById('csvUpload');
  const qrSection = document.getElementById('qrSection');
  const qrLabels = document.getElementById('qrLabels');

  let binMap = [];
  let rackRows = [];

  const headers = [
    'Full Bin Location',
    'Bin Code',
    'Part Number',
    'Description',
    'Min',
    'Max',
    'Notes',
    'QR Code'
  ];

  function val(id){
    return document.getElementById(id).value.trim();
  }

  function safeNumber(id){
    const n = parseInt(val(id), 10);
    return Number.isFinite(n) && n > 0 ? n : 0;
  }

  function pad2(value){
    return String(value).padStart(2, '0');
  }

  function shelfLetter(index){
    return String.fromCharCode(64 + index);
  }

  function posLetter(index){
    return String.fromCharCode(96 + index);
  }

  function csvEscape(value){
    const text = String(value ?? '');
    if(/[",\n\r]/.test(text)){
      return '"' + text.replace(/"/g, '""') + '"';
    }
    return text;
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function parseCsv(text){
    const rows = [];
    let row = [];
    let field = '';
    let inQuotes = false;

    for(let i = 0; i < text.length; i++){
      const ch = text[i];
      const next = text[i + 1];

      if(ch === '"' && inQuotes && next === '"'){
        field += '"';
        i++;
      } else if(ch === '"'){
        inQuotes = !inQuotes;
      } else if(ch === ',' && !inQuotes){
        row.push(field);
        field = '';
      } else if((ch === '\n' || ch === '\r') && !inQuotes){
        if(ch === '\r' && next === '\n') i++;
        row.push(field);
        if(row.some(cell => String(cell).trim() !== '')){
          rows.push(row);
        }
        row = [];
        field = '';
      } else {
        field += ch;
      }
    }

    row.push(field);
    if(row.some(cell => String(cell).trim() !== '')){
      rows.push(row);
    }

    return rows;
  }

  function makeQrPayload(row){
    return JSON.stringify({
      part: row.part || 'Part',
      bin: row.full || '',
      max: row.max || '1'
    });
  }

  function makeBinBaseCode(bin){
    return `${pad2(bin.rack || '')}${bin.shelf}${pad2(bin.binNumber)}`;
  }

  function makeFullLocation(bin, positionLetter){
    const site = bin.site || val('site');
    const category = bin.category || val('category');
    const base = `${makeBinBaseCode(bin)}${positionLetter}`;
    return [site, category, base].filter(Boolean).join(':');
  }

  function rebuildRowsFromBinMap(){
    const partDefault = val('partPlaceholder') || 'Part';
    const descDefault = val('descPlaceholder') || 'Desc';
    const minDefault = val('minPlaceholder') || '0';
    const maxDefault = val('maxPlaceholder') || '1';

    const oldByFull = {};
    rackRows.forEach(row => {
      oldByFull[row.full] = row;
    });

    const rows = [];

    binMap.forEach(bin => {
      for(let p = 1; p <= bin.positions; p++){
        const letter = posLetter(p);
        const binCode = `${makeBinBaseCode(bin)}${letter}`;
        const full = makeFullLocation(bin, letter);
        const old = oldByFull[full];

        const row = {
          full,
          bin: binCode,
          part: old?.part || bin.part || partDefault,
          desc: old?.desc || bin.desc || descDefault,
          min: old?.min || minDefault,
          max: old?.max || maxDefault,
          notes: old?.notes || ''
        };

        row.qr = makeQrPayload(row);
        rows.push(row);
      }
    });

    rackRows = rows;
  }

  function buildBinMap(){
    const site = val('site');
    const category = val('category');
    const rack = val('rack');
    const shelves = safeNumber('shelves');
    const bins = safeNumber('bins');
    const positions = safeNumber('positions');

    if(!shelves || !bins || !positions){
      alert('Enter shelves, bins per shelf, and default positions per bin before building the rack.');
      return false;
    }

    binMap = [];

    for(let s = 1; s <= shelves; s++){
      for(let b = 1; b <= bins; b++){
        binMap.push({
          site,
          category,
          rack,
          shelf: shelfLetter(s),
          shelfNumber: s,
          binNumber: b,
          positions,
          maxPositions: positions
        });
      }
    }

    rebuildRowsFromBinMap();
    return true;
  }

  function render(){
    if(!binMap.length && !rackRows.length){
      output.innerHTML = '';
      qrSection.classList.remove('active');
      qrLabels.innerHTML = '';
      return;
    }

    let visual = '<div class="rackVisual">';
    const shelves = {};

    binMap.forEach((bin, index) => {
      if(!shelves[bin.shelf]) shelves[bin.shelf] = [];
      shelves[bin.shelf].push({bin, index});
    });

    Object.keys(shelves).forEach(shelf => {
      const shelfBins = shelves[shelf];
      visual += `<div class="shelf">
        <div class="shelfTitle">Shelf ${shelf}</div>
        <div class="binRow" style="grid-template-columns:repeat(${Math.min(shelfBins.length, 8)}, minmax(0,1fr));">`;

      shelfBins.forEach(item => {
        const zeroClass = item.bin.positions === 0 ? ' binTileZero' : '';
        visual += `<button type="button" class="binTile${zeroClass}" data-bin-index="${item.index}" data-bin-base="${escapeHtml(makeBinBaseCode(item.bin))}" title="Tap to reduce positions">${item.bin.positions}</button>`;
      });

      visual += '</div></div>';
    });

    visual += '</div>';

    let table = `<div class="rackTableWrap"><table class="rackTable">
      <thead>
        <tr>
          <th>Full Bin Location</th>
          <th>Bin Code</th>
          <th>Part Number</th>
          <th>Description</th>
          <th>Min</th>
          <th>Max</th>
          <th>Notes</th>
          <th>QR Code</th>
        </tr>
      </thead>
      <tbody>`;

    rackRows.forEach((row, index) => {
      const rowBinBase = String(row.bin || '').replace(/[a-z]$/i, '');
      table += `<tr>
        <td><input data-index="${index}" data-key="full" data-bin-base="${escapeHtml(rowBinBase)}" value="${escapeHtml(row.full)}"></td>
        <td><input data-index="${index}" data-key="bin" data-bin-base="${escapeHtml(rowBinBase)}" value="${escapeHtml(row.bin)}"></td>
        <td><input data-index="${index}" data-key="part" data-bin-base="${escapeHtml(rowBinBase)}" value="${escapeHtml(row.part)}"></td>
        <td><input data-index="${index}" data-key="desc" data-bin-base="${escapeHtml(rowBinBase)}" value="${escapeHtml(row.desc)}"></td>
        <td><input data-index="${index}" data-key="min" data-bin-base="${escapeHtml(rowBinBase)}" value="${escapeHtml(row.min)}"></td>
        <td><input data-index="${index}" data-key="max" data-bin-base="${escapeHtml(rowBinBase)}" value="${escapeHtml(row.max)}"></td>
        <td><input data-index="${index}" data-key="notes" data-bin-base="${escapeHtml(rowBinBase)}" value="${escapeHtml(row.notes)}"></td>
        <td><input data-index="${index}" data-key="qr" data-bin-base="${escapeHtml(rowBinBase)}" value="${escapeHtml(row.qr)}"></td>
      </tr>`;
    });

    table += '</tbody></table></div>';
    output.innerHTML = visual + table;

    output.querySelectorAll('.binTile').forEach(btn => {
      btn.addEventListener('click', () => {
        const index = Number(btn.dataset.binIndex);
        const bin = binMap[index];

        if(!bin) return;

        const max = Number(bin.maxPositions) || safeNumber('positions') || 1;
        bin.positions = bin.positions <= 0 ? max : bin.positions - 1;

        rebuildRowsFromBinMap();
        render();
        statusNote.textContent = `${rackRows.length} bin/position labels ready.`;
      });
    });

    output.querySelectorAll('.rackTable input').forEach(input => {
      input.addEventListener('focus', () => {
        highlightBin(input.dataset.binBase || '');
        if((input.dataset.key === 'part' && input.value === 'Part') ||
           (input.dataset.key === 'desc' && input.value === 'Desc')){
          input.value = '';
        }
      });

      input.addEventListener('input', () => {
        const row = rackRows[Number(input.dataset.index)];
        if(!row) return;

        row[input.dataset.key] = input.value;

        if(['part', 'full', 'max'].includes(input.dataset.key)){
          row.qr = makeQrPayload(row);
          const qrInput = output.querySelector(`input[data-index="${input.dataset.index}"][data-key="qr"]`);
          if(qrInput) qrInput.value = row.qr;
        }

        qrSection.classList.remove('active');
        qrLabels.innerHTML = '';
      });
    });
  }

  function highlightBin(binBase){
    output.querySelectorAll('.binTile').forEach(tile => {
      tile.classList.toggle('binTileActive', tile.dataset.binBase === binBase);
    });
  }

  function buildRack(){
    if(!buildBinMap()) return;
    render();
    statusNote.textContent = `${rackRows.length} bin/position labels ready.`;
  }

  function downloadCsv(){
    if(!rackRows.length){
      alert('Build or upload a rack before downloading.');
      return;
    }

    const lines = [headers.map(csvEscape).join(',')];

    rackRows.forEach(row => {
      row.qr = makeQrPayload(row);
      lines.push([
        row.full,
        row.bin,
        row.part || 'Part',
        row.desc || 'Desc',
        row.min || '0',
        row.max || '1',
        row.notes || '',
        row.qr
      ].map(csvEscape).join(','));
    });

    const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);

    const company = document.getElementById('site').value.trim() || 'Company';
    const rack = document.getElementById('rack').value.trim() || 'Rack';
    const date = new Date().toISOString().slice(0,10);

    function clean(str){
      return String(str)
        .trim()
        .replace(/[^a-z0-9]+/gi, '_')
        .replace(/^_+|_+$/g, '');
    }

    a.download = `${clean(company)}_${clean(rack)}_${date}.csv`;

    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);
  }

  function uploadCsv(file){
    const reader = new FileReader();

    reader.onload = event => {
      const parsed = parseCsv(String(event.target.result || ''));

      if(parsed.length < 2){
        alert('Could not upload CSV: CSV has a header but no data rows.');
        return;
      }

      const headerRow = parsed[0].map(h => String(h).trim().toLowerCase());
      const dataRows = parsed.slice(1).filter(row => row.some(cell => String(cell || '').trim() !== ''));

      if(!dataRows.length){
        alert('Could not upload CSV: CSV has a header but no data rows.');
        return;
      }

      const findIndex = names => {
        for(const name of names){
          const idx = headerRow.indexOf(name.toLowerCase());
          if(idx >= 0) return idx;
        }
        return -1;
      };

      const idxFull = findIndex(['full bin location','location','full location']);
      const idxBin = findIndex(['bin code','bin','bin location']);
      const idxPart = findIndex(['part number','part','sku']);
      const idxDesc = findIndex(['description','desc']);
      const idxMin = findIndex(['min','minimum']);
      const idxMax = findIndex(['max','maximum','max qty']);
      const idxNotes = findIndex(['notes','note']);
      const idxQr = findIndex(['qr code','qr']);

      rackRows = dataRows.map(row => {
        const item = {
          full: idxFull >= 0 ? row[idxFull] || '' : row[0] || '',
          bin: idxBin >= 0 ? row[idxBin] || '' : row[1] || '',
          part: idxPart >= 0 ? row[idxPart] || 'Part' : row[2] || 'Part',
          desc: idxDesc >= 0 ? row[idxDesc] || 'Desc' : row[3] || 'Desc',
          min: idxMin >= 0 ? row[idxMin] || '0' : row[4] || '0',
          max: idxMax >= 0 ? row[idxMax] || '1' : row[5] || '1',
          notes: idxNotes >= 0 ? row[idxNotes] || '' : row[6] || '',
          qr: idxQr >= 0 ? row[idxQr] || '' : row[7] || ''
        };

        item.qr = item.qr || makeQrPayload(item);
        return item;
      });

      rebuildBinMapFromRows();
      render();

      statusNote.textContent = `${rackRows.length} bin/position labels uploaded.`;
      uploadInput.value = '';
    };

    reader.readAsText(file);
  }

  function rebuildBinMapFromRows(){
    const grouped = {};

    rackRows.forEach(row => {
      const binBase = String(row.bin || '').replace(/[a-z]$/i, '');
      const shelfMatch = binBase.match(/[A-Z]/);
      const shelf = shelfMatch ? shelfMatch[0] : 'A';
      const binNumberMatch = binBase.match(/([0-9]{2})(?!.*[0-9]{2})/);
      const binNumber = binNumberMatch ? parseInt(binNumberMatch[1], 10) : 1;

      if(!grouped[binBase]){
        grouped[binBase] = {
          site: '',
          category: '',
          rack: '',
          shelf,
          shelfNumber: shelf.charCodeAt(0) - 64,
          binNumber,
          positions: 0,
          maxPositions: Math.max(1, safeNumber('positions') || 1)
        };
      }

      grouped[binBase].positions++;
      grouped[binBase].maxPositions = Math.max(grouped[binBase].maxPositions, grouped[binBase].positions);
    });

    binMap = Object.values(grouped).sort((a,b) => {
      if(a.shelfNumber !== b.shelfNumber) return a.shelfNumber - b.shelfNumber;
      return a.binNumber - b.binNumber;
    });
  }

  async function generateQrCodes(){
    if(!rackRows.length){
      alert('Build or upload a rack before generating QR codes.');
      return;
    }

    qrLabels.innerHTML = '';
    qrSection.classList.add('active');

    for(const row of rackRows){
      row.qr = makeQrPayload(row);

      const label = document.createElement('div');
      label.className = 'qrLabel';

      const canvasWrap = document.createElement('div');
      canvasWrap.className = 'qrCanvasWrap';

      const text = document.createElement('div');
      text.className = 'qrLabelText';
      text.innerHTML = `
        <div class="qrPart">${escapeHtml(row.part || 'Part')}</div>
        <div class="qrDesc">${escapeHtml(row.desc || 'Desc')}</div>
        <div class="qrLoc">${escapeHtml(row.full || row.bin || '')}</div>
      `;

      label.appendChild(canvasWrap);
      label.appendChild(text);
      qrLabels.appendChild(label);

      try{
        if(window.QRCode && typeof window.QRCode.toCanvas === 'function'){
          const canvas = document.createElement('canvas');
          canvasWrap.appendChild(canvas);

          await window.QRCode.toCanvas(canvas, row.qr, {
            width:78,
            margin:1,
            errorCorrectionLevel:'M'
          });
        } else if(window.QRious){
          const canvas = document.createElement('canvas');
          canvasWrap.appendChild(canvas);

          new QRious({
            element:canvas,
            value:row.qr,
            size:78,
            padding:4,
            level:'M'
          });
        } else {
          const img = document.createElement('img');
          img.width = 78;
          img.height = 78;
          img.alt = 'QR code';
          img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=78x78&margin=1&data=' + encodeURIComponent(row.qr);
          canvasWrap.appendChild(img);
        }
      } catch(error){
        const img = document.createElement('img');
        img.width = 78;
        img.height = 78;
        img.alt = 'QR code';
        img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=78x78&margin=1&data=' + encodeURIComponent(row.qr);
        canvasWrap.innerHTML = '';
        canvasWrap.appendChild(img);
      }
    }

    statusNote.textContent = `${rackRows.length} QR labels generated.`;
  }

  function resetAll(){
    document.querySelectorAll('input').forEach(input => {
      if(input.type !== 'file') input.value = '';
    });

    output.innerHTML = '';
    statusNote.textContent = '';
    qrLabels.innerHTML = '';
    qrSection.classList.remove('active');
    binMap = [];
    rackRows = [];
  }

  document.getElementById('generateBtn').addEventListener('click', buildRack);
  document.getElementById('downloadBtn').addEventListener('click', downloadCsv);
  document.getElementById('uploadBtn').addEventListener('click', () => uploadInput.click());
  document.getElementById('qrBtn').addEventListener('click', generateQrCodes);
  document.getElementById('resetBtn').addEventListener('click', resetAll);

  uploadInput.addEventListener('change', () => {
    const file = uploadInput.files && uploadInput.files[0];
    if(file) uploadCsv(file);
  });
})();
</script>
<script src="assets/js/bw-header.js"></script></body>

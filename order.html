<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Order Capture</title>
<link href="assets/css/style.css" rel="stylesheet"/>

<style>
body{
  padding-top:max(0px, env(safe-area-inset-top));
  padding-bottom:max(28px, calc(env(safe-area-inset-bottom) + 18px));
}

.orderCard{
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  border:1px solid rgba(255,255,255,.10);
  border-radius:20px;
  padding:18px;
  box-shadow:0 14px 32px rgba(0,0,0,.16);
  overflow:visible;
}

.orderTopGrid{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:12px;
  margin-bottom:16px;
}

.orderRows{display:grid;gap:12px;}

.orderRow{
  position:relative;
  display:grid;
  grid-template-columns:minmax(0,1fr) 110px;
  grid-template-areas:
    "part qty"
    "scan scan";
  gap:10px;
  padding:18px 14px 14px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  background:rgba(255,255,255,.02);
}

.orderPartBlock{grid-area:part;}
.orderQtyBlock{grid-area:qty;}
.orderScanWrap{grid-area:scan;}

.field input,
.orderScanBtn,
.orderMiniBtn{
  height:48px;
  min-height:48px;
  box-sizing:border-box;
}

.field input{
  padding:0 14px;
  border-radius:12px;
  width:100%;
  min-width:0;
}

.orderScanBtn,
.orderMiniBtn{
  border-radius:12px;
  border:1px solid rgba(198,40,40,.28);
  background:linear-gradient(180deg, rgba(198,40,40,.12), rgba(198,40,40,.06));
  font-weight:800;
  color:var(--text);
  cursor:pointer;
  width:100%;
}

.orderRemoveBtn{
  position:absolute;
  top:-12px;
  right:-12px;
  width:32px;
  height:32px;
  min-width:32px;
  min-height:32px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  font-size:18px;
  line-height:1;
  background:#0b1220;
  border:2px solid rgba(198,40,40,.8);
  box-shadow:0 6px 14px rgba(0,0,0,.35);
  z-index:5;
}

.orderBottom{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  margin-top:16px;
  gap:12px;
}

.orderTopGrid,
.orderTopGrid .field,
.orderTopGrid input{
  min-width:0;
  max-width:100%;
}

#orderDate{
  width:100%;
  min-width:0;
  max-width:100%;
  appearance:none;
  -webkit-appearance:none;
}

.scannerOverlay{
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(3,8,18,.86);
  backdrop-filter:blur(6px);
}

.scannerOverlay.active{display:flex;}

.scannerPanel{
  width:min(520px, 100%);
  border:1px solid rgba(255,255,255,.14);
  border-radius:20px;
  background:linear-gradient(180deg, rgba(20,32,56,.98), rgba(9,18,34,.98));
  box-shadow:0 20px 50px rgba(0,0,0,.45);
  padding:16px;
}

.scannerTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.scannerTop h3{margin:0;}

.scannerClose{
  width:auto;
  min-width:44px;
  height:40px;
  min-height:40px;
}

.scannerFrame{
  position:relative;
  overflow:hidden;
  border-radius:16px;
  border:1px solid rgba(198,40,40,.35);
  background:#030814;
}

#qrVideo{
  width:100%;
  display:block;
  min-height:280px;
  object-fit:cover;
}

#qrCanvas{display:none;}

.scanHint{
  color:rgba(255,255,255,.72);
  font-size:13px;
  line-height:1.45;
  margin:10px 2px 0;
}

@media (max-width:980px){
  .orderTopGrid{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
}

@media (max-width:760px){
  .container{
    width:100%;
    max-width:100%;
    padding-left:14px;
    padding-right:14px;
    box-sizing:border-box;
    overflow-x:hidden;
  }

  .orderCard{
    padding:14px;
  }

  .orderTopGrid{
    grid-template-columns:1fr;
  }

  .orderTopGrid .field,
  .orderTopGrid input{
    min-width:0;
    max-width:100%;
    width:100%;
  }

  .orderRow{
    grid-template-columns:1fr;
    grid-template-areas:
      "part"
      "qty"
      "scan";
  }

  .orderRemoveBtn{
    right:-8px;
    top:-10px;
  }
}
</style>
</head>

<body>
<div class="container">
  <div id="bw-global-header"></div>

  <section class="heroPanel">
    <div class="heroIcon">🧾</div>
    <h1>Order Capture</h1>
    <p class="subtitle">
      Scan parts, enter quantities, and generate structured orders directly from the rack.
    </p>
  </section>

  <section class="orderCard">
    <div class="orderTopGrid">
      <div class="field"><label>Company</label><input id="companyName"/></div>
      <div class="field"><label>Customer</label><input id="customerName"/></div>
      <div class="field"><label>Email</label><input id="customerEmail"/></div>
      <div class="field"><label>Date</label><input id="orderDate" type="date"/></div>
      <div class="field"><label>Reference</label><input id="orderReference"/></div>
    </div>

    <h3>Items</h3>
    <div class="orderRows" id="orderRows"></div>

    <div class="orderBottom">
      <button class="smallbtn" id="addRowBtn" type="button">Add another line</button>
      <button class="btn" id="completeBtn" type="button">Complete</button>
    </div>
  </section>
</div>

<div aria-hidden="true" class="scannerOverlay" id="scannerOverlay">
  <div class="scannerPanel">
    <div class="scannerTop">
      <h3>Scan Rack QR</h3>
      <button class="orderMiniBtn scannerClose" id="scannerClose" type="button">Close</button>
    </div>
    <div class="scannerFrame">
      <video id="qrVideo" muted playsinline></video>
      <canvas id="qrCanvas"></canvas>
    </div>
    <p class="scanHint">Mobile camera only. QR should contain part number, full bin location, and max quantity.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

<script>
(() => {
  const root = document.getElementById('orderRows');
  const addBtn = document.getElementById('addRowBtn');
  const completeBtn = document.getElementById('completeBtn');
  const orderDate = document.getElementById('orderDate');

  const overlay = document.getElementById('scannerOverlay');
  const video = document.getElementById('qrVideo');
  const canvas = document.getElementById('qrCanvas');
  const closeScannerBtn = document.getElementById('scannerClose');
  const ctx = canvas.getContext('2d');

  let activeRow = null;
  let stream = null;
  let scanFrame = null;
  let lastEntryWasScan = false;

  orderDate.value = new Date().toISOString().slice(0,10);

  function isMobileDevice(){
    return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
      || (navigator.maxTouchPoints > 1 && window.innerWidth <= 1024);
  }

  function parseQrPayload(raw){
    const text = String(raw || '').trim();
    if(!text) return null;

    try{
      const obj = JSON.parse(text);
      const part = obj.part || obj.partNumber || obj.p || '';
      const bin = obj.bin || obj.fullBinLocation || obj.location || obj.full || obj.l || '';
      const max = obj.max || obj.maxQty || obj.maxStock || obj.qty || obj.q || '';
      if(part || bin || max){
        return {
          part:String(part || '').trim(),
          bin:String(bin || '').trim(),
          max:String(max || '').trim()
        };
      }
    }catch(e){}

    const values = {};
    text.split(/[|;\n]/).forEach(piece => {
      const match = piece.match(/^\s*([^:=]+)\s*[:=]\s*(.*?)\s*$/);
      if(match){
        values[match[1].trim().toLowerCase()] = match[2].trim();
      }
    });

    if(Object.keys(values).length){
      return {
        part: values.part || values.partnumber || values['part number'] || values.p || '',
        bin: values.bin || values.location || values.full || values['full bin location'] || values.l || '',
        max: values.max || values.maxqty || values['max qty'] || values['max stock'] || values.qty || values.q || ''
      };
    }

    const csv = text.split(',').map(x => x.trim());
    if(csv.length >= 3){
      return {part:csv[0], bin:csv[1], max:csv[2]};
    }

    return {part:'', bin:text, max:''};
  }

  function applyScanToRow(payload){
    if(!activeRow || !payload) return;

    const scannedRow = activeRow;
    const partInput = scannedRow.querySelector('.partInput');
    const qtyInput = scannedRow.querySelector('.qtyInput');

    const partText = [payload.part, payload.bin].filter(Boolean).join(' — ');

    partInput.value = partText || payload.bin || payload.part || '';
    qtyInput.value = payload.max || '';

    lastEntryWasScan = true;

    if(partInput.value && qtyInput.value && scannedRow === root.lastElementChild){
      const nextRow = row();

      setTimeout(() => {
        startScanner(nextRow);
      }, 300);
    }

    activeRow = null;
  }

  async function startScanner(rowEl){
    activeRow = rowEl;

    if(!isMobileDevice()){
      alert('QR scanning is mobile-only. Please open this page on a phone or tablet. Manual entry is available on PC.');
      return;
    }

    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      alert('Camera access is not available in this browser. Try Safari or Chrome on your mobile.');
      return;
    }

    if(typeof jsQR !== 'function'){
      alert('The QR scanner library could not load. Check internet connection, then refresh.');
      return;
    }

    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:'environment'}},
        audio:false
      });

      video.srcObject = stream;
      await video.play();

      overlay.classList.add('active');
      overlay.setAttribute('aria-hidden','false');

      scanLoop();
    }catch(err){
      alert('Camera permission was blocked or unavailable. QR scanning needs camera permission on mobile.');
    }
  }

  function stopScanner(){
    if(scanFrame){
      cancelAnimationFrame(scanFrame);
      scanFrame = null;
    }

    if(stream){
      stream.getTracks().forEach(track => track.stop());
    }

    stream = null;
    video.srcObject = null;
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden','true');
  }

  function scanLoop(){
    if(!stream) return;

    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts:'dontInvert'
      });

      if(code && code.data){
        const payload = parseQrPayload(code.data);
        applyScanToRow(payload);
        stopScanner();
        return;
      }
    }

    scanFrame = requestAnimationFrame(scanLoop);
  }

  function row(){
    const el = document.createElement('div');
    el.className = 'orderRow';

    el.innerHTML = `
      <div class="field orderPartBlock">
        <label>Part number</label>
        <input class="partInput">
      </div>

      <div class="field orderQtyBlock">
        <label>Qty</label>
        <input class="qtyInput" type="number">
      </div>

      <button class="orderMiniBtn orderRemoveBtn" type="button">×</button>

      <div class="orderScanWrap">
        <button class="orderScanBtn" type="button">Scan QR</button>
      </div>
    `;

    root.appendChild(el);

    const part = el.querySelector('.partInput');
    const qty = el.querySelector('.qtyInput');

    qty.addEventListener('blur', () => {
      if(part.value && qty.value && el === root.lastElementChild){
        lastEntryWasScan = false;
        row();
      }
    });

    qty.addEventListener('keydown', event => {
      if(event.key === 'Enter'){
        event.preventDefault();
        if(part.value && qty.value && el === root.lastElementChild){
          lastEntryWasScan = false;
          row();
        }
      }
    });

    el.querySelector('.orderRemoveBtn').onclick = () => {
      if(root.children.length === 1){
        part.value = '';
        qty.value = '';
      }else{
        el.remove();
      }
    };

    el.querySelector('.orderScanBtn').onclick = () => startScanner(el);

    return el;
  }

  function collectItems(){
    return Array.from(root.querySelectorAll('.orderRow')).map(el => ({
      part: el.querySelector('.partInput').value.trim(),
      qty: el.querySelector('.qtyInput').value.trim()
    })).filter(x => x.part && x.qty);
  }

  function openEmail(){
    const to = document.getElementById('customerEmail').value.trim();
    const company = document.getElementById('companyName').value.trim();
    const customer = document.getElementById('customerName').value.trim();
    const date = document.getElementById('orderDate').value.trim();
    const reference = document.getElementById('orderReference').value.trim();
    const items = collectItems();

    if(!to){
      alert('Enter an email address.');
      return;
    }

    if(!items.length){
      alert('Add at least one item before completing.');
      return;
    }

    let body = '';
    body += `Company: ${company || '-'}\n`;
    body += `Customer: ${customer || '-'}\n`;
    body += `Date: ${date || '-'}\n`;
    body += `Reference: ${reference || '-'}\n\n`;
    body += `Qty | Part Number / Bin Location\n`;
    body += `----|------------------------------\n`;

    items.forEach(item => {
      body += `${item.qty} | ${item.part}\n`;
    });

    const subject = ['Order Request', reference, company].filter(Boolean).join(' | ');

    window.location.href =
      `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }

  closeScannerBtn.onclick = stopScanner;

  addBtn.onclick = () => {
    lastEntryWasScan = false;
    const newRow = row();
    const input = newRow.querySelector('.partInput');
    if(input){
      input.focus();
      input.scrollIntoView({behavior:'smooth', block:'center'});
    }
  };

  completeBtn.onclick = openEmail;

  row();
})();
</script>

<script src="assets/js/bw-header.js"></script>
</body>
</html>

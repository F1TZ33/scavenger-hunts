<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Order Capture</title>
<link href="assets/css/style.css" rel="stylesheet"/>

<style>
body{
  padding-top:max(0px, env(safe-area-inset-top));
  padding-bottom:max(28px, calc(env(safe-area-inset-bottom) + 18px));
}

.orderCard{
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  border:1px solid rgba(255,255,255,.10);
  border-radius:20px;
  padding:18px;
  box-shadow:0 14px 32px rgba(0,0,0,.16);
  overflow:visible;
}

.orderTopGrid{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:12px;
  margin-bottom:16px;
}

.orderRows{ display:grid; gap:12px; }

.orderRow{
  position:relative;
  display:grid;
  grid-template-columns:minmax(0,1fr) 110px;
  grid-template-areas:
    "part qty"
    "scan scan";
  gap:10px;
  padding:18px 14px 14px 14px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  background:rgba(255,255,255,.02);
}

.orderPartBlock{ grid-area:part; }
.orderQtyBlock{ grid-area:qty; }
.orderScanWrap{ grid-area:scan; }

.field input,
.orderScanBtn,
.orderMiniBtn{
  height:48px;
  min-height:48px;
  box-sizing:border-box;
}

.field input{
  padding:0 14px;
  border-radius:12px;
  width:100%;
  min-width:0;
}

.orderScanBtn,
.orderMiniBtn{
  border-radius:12px;
  border:1px solid rgba(198,40,40,.28);
  background:linear-gradient(180deg, rgba(198,40,40,.12), rgba(198,40,40,.06));
  font-weight:800;
  color:var(--text);
  cursor:pointer;
  width:100%;
}

.orderRemoveBtn{
  position:absolute;
  top:-12px;
  right:-12px;
  width:32px;
  height:32px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  background:#0b1220;
  border:2px solid rgba(198,40,40,.8);
  box-shadow:0 6px 14px rgba(0,0,0,.35);
  z-index:5;
}

.orderBottom{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  margin-top:16px;
  gap:12px;
}

/* 🔥 FIX: Prevent date field overflow */
.orderTopGrid,
.orderTopGrid .field,
.orderTopGrid input{
  min-width:0;
  max-width:100%;
}

#orderDate{
  width:100%;
  min-width:0;
  max-width:100%;
  appearance:none;
  -webkit-appearance:none;
}

/* Mobile */
@media (max-width:980px){
  .orderTopGrid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
}

@media (max-width:760px){
  .container{
    width:100%;
    padding-left:14px;
    padding-right:14px;
  }

  .orderTopGrid{
    grid-template-columns:1fr;
  }

  .orderRow{
    grid-template-columns:1fr;
    grid-template-areas:
      "part"
      "qty"
      "scan";
  }
}
</style>
</head>

<body>
<div class="container">
  <div id="bw-global-header"></div>

  <section class="heroPanel">
    <div class="heroIcon">🧾</div>
    <h1>Order Capture</h1>
    <p class="subtitle">
      Scan parts, enter quantities, and generate structured orders directly from the rack.
    </p>
  </section>

  <section class="orderCard">
    <div class="orderTopGrid">
      <div class="field"><label>Company</label><input id="companyName"/></div>
      <div class="field"><label>Customer</label><input id="customerName"/></div>
      <div class="field"><label>Email</label><input id="customerEmail"/></div>
      <div class="field"><label>Date</label><input id="orderDate" type="date"/></div>
      <div class="field"><label>Reference</label><input id="orderReference"/></div>
    </div>

    <h3>Items</h3>
    <div class="orderRows" id="orderRows"></div>

    <div class="orderBottom">
      <button class="smallbtn" id="addRowBtn">Add another line</button>
      <button class="btn" id="completeBtn">Complete</button>
    </div>
  </section>
</div>

<script>
(() => {
  const root = document.getElementById('orderRows');
  const addBtn = document.getElementById('addRowBtn');
  const completeBtn = document.getElementById('completeBtn');
  const orderDate = document.getElementById('orderDate');

  orderDate.value = new Date().toISOString().slice(0,10);

  function row(){
    const el = document.createElement('div');
    el.className = 'orderRow';
    el.innerHTML = `
      <div class="field orderPartBlock">
        <label>Part number</label>
        <input class="partInput">
      </div>
      <div class="field orderQtyBlock">
        <label>Qty</label>
        <input class="qtyInput" type="number">
      </div>
      <button class="orderMiniBtn orderRemoveBtn" type="button">×</button>
      <div class="orderScanWrap">
        <button class="orderScanBtn" type="button">Scan QR</button>
      </div>
    `;

    root.appendChild(el);

    const part = el.querySelector('.partInput');
    const qty = el.querySelector('.qtyInput');

    qty.addEventListener('blur', () => {
      if(part.value && qty.value && el === root.lastElementChild) row();
    });

    el.querySelector('.orderRemoveBtn').onclick = () => {
      if(root.children.length === 1){
        part.value='';
        qty.value='';
      } else el.remove();
    };
  }

  function collectItems(){
    return Array.from(root.querySelectorAll('.orderRow')).map(el => ({
      part: el.querySelector('.partInput').value.trim(),
      qty: el.querySelector('.qtyInput').value.trim()
    })).filter(x => x.part && x.qty);
  }

  function openEmail(){
    const to = document.getElementById('customerEmail').value.trim();
    const items = collectItems();

    if(!to){ alert('Enter an email address.'); return; }
    if(!items.length){ alert('Add at least one item.'); return; }

    let body = 'Qty | Part\n----|------\n';
    items.forEach(i => body += `${i.qty} | ${i.part}\n`);

    window.location.href = `mailto:${to}?body=${encodeURIComponent(body)}`;
  }

  addBtn.onclick = row;
  completeBtn.onclick = openEmail;

  row();
})();
</script>

<script src="assets/js/bw-header.js"></script>
</body>
</html>

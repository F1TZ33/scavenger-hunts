<!DOCTYPE html>

<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>FAQs</title><link href="assets/css/style.css" rel="stylesheet"/></head><body data-page="page"><div class="container"><div id="bw-global-header"></div><div class="bw-page-actions" hidden=""><button class="btn" data-action="devnote" data-editor-only="1" style="display:none" type="button">Dev notes</button><button class="btn" data-action="admin" type="button">Admin</button></div><section class="heroPanel"><div class="heroIcon">❓</div><h1>FAQs</h1><p class="subtitle" style="text-align:center;max-width:820px;margin:10px auto 0">Frequently asked questions. Additions are stored locally for now.</p></section><div class="addBar"><button class="btn" data-editor-only="1" id="addFaqBtn" style="display:none" type="button">Add FAQ</button></div><section class="bubbleGrid" id="faqGrid"></section></div><div class="modalBack" id="faqAddModal"><div class="modal"><h3>Add FAQ</h3><div class="field"><label>Question</label><input id="faqAddQ"/></div><div class="field"><label>Answer</label><textarea id="faqAddA"></textarea></div><div class="actions"><button class="btn" id="faqAddSave" type="button">Save FAQ</button><button class="smallbtn" data-close="faqAddModal" type="button">Cancel</button></div></div></div>
<div class="modalBack" id="suggestModal"><div class="modal"><h3>Suggest edit</h3><p class="subtitle" style="margin:0 0 10px">This creates an email draft to the manual admin. You’ll still click Send in your email app.</p><div class="row"><div class="field"><label>Your name (required)</label><input id="se_name" placeholder="e.g., Jordan"/></div><div class="field"><label>Urgency (optional)</label><select id="se_urgency"><option value="">—</option><option>Low</option><option>Medium</option><option>High</option></select></div></div><div class="field"><label>Suggestion (required)</label><textarea id="se_suggestion" placeholder="What should change? Be specific if possible."></textarea></div><div class="field" data-editor-field="1" style="display:none"><label>Section / location (optional)</label><input id="se_section" placeholder="Where on the page does this apply?"/></div><div class="field" data-editor-field="1" style="display:none"><label>Proposed replacement wording (optional)</label><textarea id="se_replacement" placeholder="Paste the new wording here (optional)."></textarea></div><div class="field" data-editor-field="1" style="display:none"><label>Reason / context (optional)</label><textarea id="se_reason" placeholder="Why should this change? Any customer context?"></textarea></div><input id="se_page" type="hidden"/><input id="se_path" type="hidden"/><input id="se_time" type="hidden"/><div class="actions"><button class="btn" id="se_send" type="button">Confirm &amp; create email</button><button class="smallbtn" data-close="suggestModal" type="button">Cancel</button></div></div></div>
<div class="modalBack" id="devNoteModal"><div class="modal"><h3>Developer notes (private)</h3><p class="subtitle" style="margin:0 0 10px">Saved locally on this computer/browser. Not visible to normal users.</p><div class="field"><label>Page</label><input id="dn_path" readonly=""/></div><div class="field"><label>Notes</label><textarea id="dn_note" placeholder="Private admin notes for this page…"></textarea></div><div class="actions"><button class="btn" id="dn_save" type="button">Save notes</button><button class="smallbtn" data-close="devNoteModal" type="button">Close</button></div></div></div>
<script src="assets/js/app.js"></script>
<script>
const FAQ_KEY='bw.faqs.custom'; const baseFaqs=[{q:'Do we accept AMEX?',a:'No.'},{q:'Can we source non-stock items?',a:'Yes — confirm application and supplier options first.'}];
function getFaqs(){try{return JSON.parse(localStorage.getItem(FAQ_KEY)||'[]')}catch(e){return []}}
function saveFaqs(v){localStorage.setItem(FAQ_KEY,JSON.stringify(v))}
function renderFaqs(){const grid=document.getElementById('faqGrid'); grid.innerHTML=''; [...baseFaqs,...getFaqs()].forEach(item=>{const art=document.createElement('article'); art.className='editBubble'; art.innerHTML=`<h2>${item.q}</h2><p>${item.a}</p>`; grid.appendChild(art);});}
function setFaqAddVisibility(){const s=loadSettings(); document.getElementById('addFaqBtn').style.display=(getEditorMode() && isAdminAuthed() && s.allowLocalAdds)?'':'none';}
document.addEventListener('DOMContentLoaded', ()=>{renderFaqs(); const sync=()=>setFaqAddVisibility(); sync(); window.addEventListener('focus', sync); document.addEventListener('visibilitychange', sync); setInterval(sync, 1000); document.getElementById('addFaqBtn').onclick=()=>openModal('faqAddModal'); document.getElementById('faqAddSave').onclick=()=>{const q=(document.getElementById('faqAddQ').value||'').trim(), a=(document.getElementById('faqAddA').value||'').trim(); if(!q||!a) return alert('Enter a question and answer.'); const items=getFaqs(); items.push({q,a}); saveFaqs(items); closeModal('faqAddModal'); document.getElementById('faqAddQ').value=''; document.getElementById('faqAddA').value=''; renderFaqs();};});
</script><script src="assets/js/bw-header.js"></script></body></html>
